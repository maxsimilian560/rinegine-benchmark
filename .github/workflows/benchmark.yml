name: Continuous Benchmark

on:
  push:
    branches: [main, master]
    paths:
      - '*.py'
      - '*.sh'
      - '*.bat'
      - '*.cpp'
      - '*.md'
      - '.github/workflows/benchmark.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: benchmark

      - name: Checkout Rinegine
        uses: actions/checkout@v4
        with:
          repository: maxsimilian560/Rinegine
          ref: wip
          path: Rinegine
          token: ${{ secrets.benchmark_token }}
      - name: Install deps
        run: |
          sudo apt-get update && sudo apt-get install -y cmake g++ libboost-dev libbenchmark-dev python3
          git clone --depth 1 https://github.com/electronicarts/EASTL.git ../EASTL
          git clone --depth 1 https://github.com/electronicarts/EABase.git ../EABase
          mv ../EABase/include/Common/EABase ../EASTL/include/
      - name: Build
        working-directory: benchmark
        run: |
          echo linux | ../Rinegine/bin/rgcmd

      - name: Run benchmarks
        working-directory: benchmark
        run: |
          sh ./run.sh
        
      - name: Commit results
        working-directory: benchmark
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md ./list/.
          git diff --cached --quiet || git commit -m "chore: update benchmark results [skip ci]"
          git push
